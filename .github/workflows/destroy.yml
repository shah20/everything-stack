name: destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        required: true
        default: dev
        type: choice
        options:
          - production
          - dev

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      NODE_ENV: ${{ inputs.environment }}
      NODE_VERSION: '24.x'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: ./.github/actions/aws-oidc
        with:
          iam-role-arn: ${{ vars.AWS_OIDC_ROLE_ARN }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Destroy stack
        env:
          CDK_DESTROY: true
        run: npm run destroy:ci